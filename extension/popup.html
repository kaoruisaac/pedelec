<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-width: 360px;
        margin: 0;
        background: #f7f8fa;
        color: #1d2430;
      }

      main {
        display: grid;
        gap: 12px;
        padding: 14px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 650;
        letter-spacing: 0;
      }

      .pill {
        align-self: start;
        border: 1px solid #cbd3df;
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 12px;
        line-height: 1;
      }

      .pill[data-connected="true"] {
        border-color: #17803c;
        color: #146c35;
        background: #e7f6ec;
      }

      .provider-error {
        display: grid;
        gap: 8px;
        border: 1px solid #d92d20;
        border-radius: 8px;
        background: #fff1f0;
        padding: 10px;
      }

      .provider-error[hidden] {
        display: none;
      }

      .provider-error-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .provider-error-header strong {
        overflow-wrap: anywhere;
        font-size: 14px;
      }

      .provider-error-dismiss {
        flex: none;
        border: 0;
        border-radius: 4px;
        padding: 0 4px;
        background: transparent;
        color: #b42318;
        font-size: 20px;
        line-height: 1;
      }

      .provider-error-dismiss:hover,
      .provider-error-dismiss:focus-visible {
        background: #fdd9d6;
      }

      .provider-error p {
        margin: 0;
        overflow-wrap: anywhere;
        white-space: pre-wrap;
        color: #7a271a;
        font-size: 13px;
        line-height: 1.45;
      }

      .approval {
        display: grid;
        gap: 10px;
        border-top: 1px solid #d8dee8;
        padding-top: 12px;
      }

      .approval[hidden] {
        display: none;
      }

      .approval h2 {
        margin: 0;
        font-size: 14px;
        font-weight: 650;
        letter-spacing: 0;
      }

      .approval p {
        margin: 0;
        color: #4d5968;
        font-size: 13px;
        line-height: 1.45;
      }

      .origin {
        overflow-wrap: anywhere;
        border: 1px solid #cbd3df;
        border-radius: 6px;
        background: #ffffff;
        padding: 8px;
        font: 12px ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      }

      .actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      button {
        border: 1px solid #b9c3d1;
        border-radius: 6px;
        padding: 7px 10px;
        background: #ffffff;
        color: #1d2430;
        font: inherit;
        cursor: pointer;
      }

      button.primary {
        border-color: #1769aa;
        background: #1769aa;
        color: #ffffff;
      }

      button.danger {
        border-color: #b42318;
        color: #b42318;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #171b22;
          color: #edf1f7;
        }

        .approval {
          border-top-color: #303846;
        }

        .approval p {
          color: #b7c0ce;
        }

        .provider-error {
          border-color: #f97066;
          background: #3a1d1b;
        }

        .provider-error-dismiss {
          color: #fda29b;
        }

        .provider-error-dismiss:hover,
        .provider-error-dismiss:focus-visible {
          background: #592421;
        }

        .provider-error p {
          color: #fdbab4;
        }

        .origin,
        button {
          border-color: #3b4656;
          background: #202631;
          color: #edf1f7;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Pedelec</h1>
        <span id="connection" class="pill" data-connected="false">disconnected</span>
      </header>
      <section id="provider-error" class="provider-error" hidden>
        <div class="provider-error-header">
          <strong id="provider-error-provider"></strong>
          <button
            id="dismiss-provider-error"
            class="provider-error-dismiss"
            type="button"
            aria-label="Dismiss provider error"
          >×</button>
        </div>
        <p id="provider-error-message"></p>
      </section>
      <section id="approval" class="approval" hidden>
        <h2>Approve This Site</h2>
        <div id="origin" class="origin"></div>
        <p>Approving this origin allows this site to create local Pedelec agent sessions through the extension.</p>
        <div class="actions">
          <button id="reject" type="button">Reject</button>
          <button id="approve" type="button" class="primary">Approve</button>
        </div>
      </section>
      <section id="revocation" class="approval" hidden>
        <h2>Approved Site</h2>
        <div id="approved-origin" class="origin"></div>
        <p>This origin can create local Pedelec agent sessions through the extension.</p>
        <div class="actions">
          <button id="revoke" type="button" class="danger">Revoke Approval</button>
        </div>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
